<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eaf1f8"/>
      <stop offset="100%" style="stop-color:#cfdceb"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a4f96"/>
      <stop offset="100%" style="stop-color:#0b66c3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>
  
  <!-- LAN -->
  <rect x="50" y="80" width="200" height="160" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="150" y="115" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#16a34a" text-anchor="middle">LAN</text>
  <text x="150" y="140" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Red de Área Local</text>
  <text x="150" y="158" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#16a34a" text-anchor="middle">1 Gbps típico</text>
  <text x="150" y="174" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Casa / Oficina</text>
  <circle cx="100" cy="220" r="10" fill="#16a34a" stroke="#16a34a" stroke-width="2"/><circle cx="130" cy="220" r="10" fill="#16a34a" stroke="#16a34a" stroke-width="2"/><circle cx="160" cy="220" r="10" fill="#16a34a" stroke="#16a34a" stroke-width="2"/>
  <circle cx="145" cy="200" r="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <!-- MAN -->
  <rect x="300" y="80" width="200" height="160" rx="12" fill="#dbeafe" stroke="#0b66c3" stroke-width="2"/>
  <text x="400" y="115" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#0b66c3" text-anchor="middle">MAN</text>
  <text x="400" y="140" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Red de Área Metro</text>
  <text x="400" y="158" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0b66c3" text-anchor="middle">Ciudad / Campus</text>
  <!-- WAN -->
  <rect x="550" y="80" width="200" height="160" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="650" y="115" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#d97706" text-anchor="middle">WAN</text>
  <text x="650" y="140" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Red de Área Amplia</text>
  <text x="650" y="158" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#d97706" text-anchor="middle">Internet = WAN global</text>
  <!-- Arrows -->
  <polygon points="255,155 295,145 295,165" fill="#0b66c3"/>
  <polygon points="505,155 545,145 545,165" fill="#d97706"/>
  <!-- Bottom extras -->
  <rect x="60" y="310" width="120" height="40" rx="20" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="120" y="335" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">PAN</text>
  <rect x="210" y="310" width="120" height="40" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="270" y="335" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">WLAN</text>
  <rect x="360" y="310" width="120" height="40" rx="20" fill="#fef3c7" stroke="#d97706" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="420" y="335" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Bluetooth</text>
  <rect x="510" y="310" width="120" height="40" rx="20" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="570" y="335" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#dc2626" text-anchor="middle">Fibra</text>
  <text x="400" y="420" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#50607a" text-anchor="middle">Cada tipo define alcance geográfico y tecnología de conexión</text>
  <text x="400" y="445" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0b66c3" text-anchor="middle">LAN → MAN → WAN → Internet</text>
</svg>