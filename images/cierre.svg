<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eaf1f8"/>
      <stop offset="100%" style="stop-color:#cfdceb"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a4f96"/>
      <stop offset="100%" style="stop-color:#0b66c3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>
  <rect x="50" y="40" width="340" height="430" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="220" y="68" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Semana 1 — Aprendimos</text><text x="70" y="100" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Términos clave de redes</text><text x="70" y="136" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Tipos: LAN/WAN/MAN/WLAN</text><text x="70" y="172" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Topologías de red</text><text x="70" y="208" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Modelo OSI 7 capas</text><text x="70" y="244" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ TCP vs UDP</text><text x="70" y="280" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Puertos (22,53,80,443...)</text><text x="70" y="316" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Wi-Fi 802.11 estándares</text><text x="70" y="352" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Dispositivos: Hub/Switch/Router</text><text x="70" y="388" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Seguridad: Firewall/IDS/VPN</text><text x="70" y="424" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Servicios: DNS/DHCP/IPv4</text><rect x="420" y="40" width="330" height="200" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="585" y="68" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Semana 2 — Próxima clase</text><text x="440" y="100" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">→ Conexión de dispositivos</text><text x="440" y="134" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">→ Redes cableadas e inalámbricas</text><text x="440" y="168" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">→ Tarjetas de red + IoT</text><text x="440" y="202" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">→ Configuración de cortafuegos</text><text x="440" y="236" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">→ Diagnóstico de problemas</text><rect x="420" y="260" width="330" height="100" rx="12" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><text x="585" y="288" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">Extra clase esta semana</text><text x="585" y="312" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">9 horas — avance del proyecto</text><text x="585" y="332" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Traigan esbozo de red</text><text x="400" y="430" font-family="Arial,sans-serif" font-size="14" font-weight="normal" fill="#50607a" text-anchor="middle">¡Excelente trabajo hoy! Nos vemos en la Semana 2</text>
</svg>