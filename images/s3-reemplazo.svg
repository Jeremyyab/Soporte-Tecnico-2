<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#eaf1f8"/><stop offset="100%" stop-color="#cfdceb"/></linearGradient></defs><rect width="800" height="500" fill="url(#bg)" rx="16"/><text x="400" y="32" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">Procedimiento de reemplazo seguro - 6 pasos</text><rect x="50" y="60" width="700" height="52" rx="10" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><circle cx="80" cy="86" r="17" fill="#0b66c3" stroke="#0b66c3" stroke-width="0"/><text x="80" y="91" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text><text x="107" y="82" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="start">Documentar</text><text x="107" y="100" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="start">Fotografiar estado inicial, posicion de tornillos y conectores</text><polygon points="400,112 406,122 394,122" fill="#0b66c3"/><rect x="50" y="122" width="700" height="52" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/><circle cx="80" cy="148" r="17" fill="#dc2626" stroke="#dc2626" stroke-width="0"/><text x="80" y="153" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text><text x="107" y="144" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#dc2626" text-anchor="start">Desconectar</text><text x="107" y="162" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="start">Apagar completamente, retirar bateria, pulsera ESD, descarga estatica</text><polygon points="400,174 406,184 394,184" fill="#dc2626"/><rect x="50" y="184" width="700" height="52" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><circle cx="80" cy="210" r="17" fill="#d97706" stroke="#d97706" stroke-width="0"/><text x="80" y="215" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text><text x="107" y="206" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="start">Desensamblar</text><text x="107" y="224" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="start">Tornillos en orden, separar carcasa con espatula plastica</text><polygon points="400,236 406,246 394,246" fill="#d97706"/><rect x="50" y="246" width="700" height="52" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><circle cx="80" cy="272" r="17" fill="#16a34a" stroke="#16a34a" stroke-width="0"/><text x="80" y="277" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text><text x="107" y="268" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="start">Reemplazar</text><text x="107" y="286" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="start">Instalar componente nuevo respetando orientacion y conectores</text><polygon points="400,298 406,308 394,308" fill="#16a34a"/><rect x="50" y="308" width="700" height="52" rx="10" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><circle cx="80" cy="334" r="17" fill="#0b66c3" stroke="#0b66c3" stroke-width="0"/><text x="80" y="339" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">5</text><text x="107" y="330" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="start">Ensamblar</text><text x="107" y="348" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="start">Reensamblar en orden inverso, verificar todos los conectores</text><polygon points="400,360 406,370 394,370" fill="#0b66c3"/><rect x="50" y="370" width="700" height="52" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><circle cx="80" cy="396" r="17" fill="#16a34a" stroke="#16a34a" stroke-width="0"/><text x="80" y="401" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">6</text><text x="107" y="392" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="start">Verificar</text><text x="107" y="410" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="start">Encender, POST correcto, SO detecta, prueba funcional completa</text><text x="400" y="465" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Herramientas: Philips 00, espatula plastica, pulsera ESD, organizador tornillos</text></svg>