  <text x="160" y="132" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ IPs correctas</text><text x="400" y="132" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Ping exitoso</text><text x="600" y="132" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Documentado</text>
