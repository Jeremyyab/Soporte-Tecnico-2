  <circle cx="400" cy="270" r="75" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="400" y="262" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Grupo 2</text><text x="400" y="282" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">2 min</text>
  <circle cx="600" cy="270" r="75" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="600" y="262" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Grupo 3</text><text x="600" y="282" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">2 min</text>
