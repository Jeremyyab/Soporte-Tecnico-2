<svg xmlns="http://www.w3.org/2000/svg" width="800" height="510" viewBox="0 0 800 510"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#eaf1f8"/><stop offset="100%" stop-color="#cfdceb"/></linearGradient></defs><rect width="800" height="510" fill="url(#bg)" rx="16"/><rect x="40" y="40" width="340" height="445" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="210" y="68" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Semana 3 - Completada</text><text x="60" y="100" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">+ Componentes internos de una laptop</text><text x="60" y="132" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">+ CPU, RAM SO-DIMM, SSD M.2, Pantalla</text><text x="60" y="164" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">+ Config. inalambrica en portatiles</text><text x="60" y="196" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">+ Gestion de energia y planes</text><text x="60" y="228" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">+ Instalacion y reemplazo de HW</text><text x="60" y="260" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">+ Procedimiento ESD - 6 pasos</text><text x="60" y="292" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">+ Dispositivos moviles especiales</text><text x="60" y="324" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">+ MDM - gestion empresarial</text><text x="60" y="356" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">+ Mantenimiento programado</text><text x="60" y="388" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">+ Caso Practico 3 - PT con Wi-Fi</text><text x="60" y="420" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">+ Laptops y moviles en la red</text><text x="60" y="452" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">+ Topologia y pings verificados</text><rect x="410" y="40" width="350" height="220" rx="14" fill="#dbeafe" stroke="#0b66c3" stroke-width="2"/><text x="585" y="68" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">Semana 4 - FINAL</text><text x="430" y="100" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">-> Conectividad movil avanzada</text><text x="430" y="136" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">-> Diagnostico integrado</text><text x="430" y="172" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">-> Mantenimiento preventivo</text><text x="430" y="208" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">-> Solucion de problemas</text><text x="430" y="244" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">-> Defensa del Proyecto Final</text><rect x="410" y="278" width="350" height="105" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="585" y="305" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">SEMANA 4 = DEFENSA</text><text x="585" y="330" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Proyecto COMPLETO listo</text><text x="585" y="350" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Practicar presentacion oral</text><text x="585" y="370" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">10-15 min por grupo</text><rect x="410" y="400" width="350" height="85" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="585" y="424" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Extra clase: 10 horas</text><text x="585" y="446" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Completar topologia completa</text><text x="585" y="464" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Preparar defensa oral</text><text x="400" y="496" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#50607a" text-anchor="middle">Ultimo empujon! Semana 4 es la defensa final</text></svg>