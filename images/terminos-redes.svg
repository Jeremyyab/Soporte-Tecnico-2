  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>
  <rect x="80" y="80" width="160" height="70" rx="10" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><text x="160" y="106" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">Ancho de banda</text><text x="160" y="128" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Mbps / Gbps</text><rect x="270" y="80" width="160" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="350" y="106" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Latencia</text><text x="350" y="128" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">milisegundos</text><rect x="460" y="80" width="160" height="70" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="540" y="106" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Protocolo</text><text x="540" y="128" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">TCP/IP, HTTP</text><rect x="650" y="80" width="120" height="70" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/><text x="710" y="106" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#dc2626" text-anchor="middle">MAC</text><text x="710" y="128" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Capa 2</text><rect x="80" y="200" width="160" height="70" rx="10" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><text x="160" y="226" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">Paquete</text><text x="160" y="248" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Header + Data</text><rect x="270" y="200" width="160" height="70" rx="10" fill="#dcfce7" 