#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><text x="96" y="365" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0b66c3" text-anchor="start">2 — Enlace</text><text x="420" y="365" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#50607a" text-anchor="start">MAC, Switches</text><rect x="80" y="390" width="640" height="46" rx="8" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><text x="96" y="420" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0b66c3" text-anchor="start">1 — Física</text><text x="420" y="420" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#50607a" text-anchor="start">Cables, Señales</text><text x="400" y="465" font-family="Arial,sans-serif" font-size="14" font-weight="normal" fill="#50607a" text-anchor="middle">Modelo de referencia OSI — 7 capas</text><text x="400" y="485" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0b66c3" text-anchor="middle">El técnico diagnostica de capa 1 hacia arriba</text>
