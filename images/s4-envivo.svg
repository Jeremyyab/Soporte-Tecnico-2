<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#eaf1f8"/><stop offset="100%" stop-color="#cfdceb"/></linearGradient></defs><rect width="800" height="500" fill="url(#bg)" rx="16"/><text x="400" y="30" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">Mientras cada grupo defiende</text><rect x="40" y="55" width="340" height="180" rx="12" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><text x="210" y="80" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">El grupo que defiende</text><line x1="40" y1="90" x2="380" y2="90" stroke="#0b66c3" stroke-width="0.8"/><text x="58" y="112" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Abrir el .pkt en PT antes de empezar</text><text x="58" y="130" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Hablar al frente, no a la pantalla</text><text x="58" y="148" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Ejecutar los pings en vivo — no capturas</text><text x="58" y="166" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Explicar en voz alta lo que hace cada comando</text><text x="58" y="184" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Todos los integrantes hablan al menos 1 vez</text><text x="58" y="202" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="start">Tiempo maximo: 15 minutos</text><rect x="420" y="55" width="340" height="180" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="590" y="80" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Los grupos que esperan</text><line x1="420" y1="90" x2="760" y2="90" stroke="#16a34a" stroke-width="0.8"/><text x="438" y="112" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Observar y tomar nota de errores</text><text x="438" y="130" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Preparar preguntas para el grupo</text><text x="438" y="148" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Revisar su propio .pkt mientras esperan</text><text x="438" y="166" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">No usar el celular durante las defensas</text><text x="438" y="184" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Respetar el tiempo de los companieros</text><text x="438" y="202" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="start">El orden de defensa se sortea al inicio</text><rect x="40" y="260" width="720" height="80" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="400" y="285" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Cronograma de la defensa</text><text x="120" y="312" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">00:00 Sorteo orden</text><text x="280" y="312" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">00:05 Grupo 1</text><text x="420" y="312" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">00:20 Grupo 2</text><text x="560" y="312" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">00:35 Grupo 3</text><text x="680" y="312" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">00:50 Grupo 4</text><rect x="40" y="365" width="720" height="90" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/><text x="400" y="390" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#dc2626" text-anchor="middle">Errores que restan puntos</text><text x="130" y="415" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">PT que no abre o red caida</text><text x="370" y="415" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Pings que fallan en vivo</text><text x="600" y="415" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Solo un integrante habla</text></svg>