<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#eaf1f8"/><stop offset="100%" stop-color="#cfdceb"/></linearGradient></defs><rect width="800" height="500" fill="url(#bg)" rx="16"/><rect x="40" y="40" width="345" height="192" rx="12" fill="#dbeafe" stroke="#0b66c3" stroke-width="2"/><text x="212" y="67" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">Configuracion Inalambrica</text><line x1="40" y1="77" x2="385" y2="77" stroke="#0b66c3" stroke-width="0.8"/><text x="58" y="100" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Adaptador Wi-Fi integrado (802.11ax)</text><text x="58" y="119" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Driver actualizado - clave para funcionar</text><text x="58" y="138" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Dual band: 2.4 GHz alcance / 5 GHz velocidad</text><text x="58" y="157" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Bluetooth 5.x en la misma tarjeta NIC</text><text x="58" y="176" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Modo avion: desactiva Wi-Fi + BT + celular</text><text x="58" y="196" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">VPN obligatoria en redes publicas</text><text x="58" y="215" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="start">Fn + F2/F8: activa/desactiva</text><rect x="425" y="40" width="335" height="192" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="592" y="67" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Gestion de Energia</text><line x1="425" y1="77" x2="760" y2="77" stroke="#d97706" stroke-width="0.8"/><text x="443" y="100" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Plan Rendimiento: maximo CPU/consumo</text><text x="443" y="119" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Plan Equilibrado: balance (recomendado)</text><text x="443" y="138" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Plan Ahorro: baja frecuencia CPU</text><text x="443" y="157" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Suspension S3: RAM activa, disco quieto</text><text x="443" y="176" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Hibernacion S4: guarda RAM en disco</text><text x="443" y="196" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Throttling: baja velocidad por temperatura</text><text x="443" y="215" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="start">Calibrar bateria 1x mes</text><rect x="40" y="255" width="720" height="100" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="400" y="280" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Diagnostico paso a paso - Wi-Fi no conecta</text><text x="80" y="308" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">1. Driver activo</text><text x="220" y="308" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">2. SSID visible</text><text x="360" y="308" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">3. Clave ok</text><text x="510" y="308" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">4. IP por DHCP</text><text x="650" y="308" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">5. Ping GW</text><rect x="40" y="378" width="720" height="80" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="400" y="404" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Plan de ahorro puede desactivar el adaptador Wi-Fi</text><text x="400" y="428" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Verificar: Adm. dispositivos - NIC - Administracion de energia</text></svg>