<svg xmlns="http://www.w3.org/2000/svg" width="800" height="490" viewBox="0 0 800 490"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#eaf1f8"/><stop offset="100%" stop-color="#cfdceb"/></linearGradient></defs><rect width="800" height="490" fill="url(#bg)" rx="16"/><text x="400" y="30" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">Rubrica del Proyecto Final — 60 puntos = 55% de la nota</text><rect x="40" y="70" width="720" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><rect x="40" y="70" width="60" height="52" rx="8" fill="#16a34a" stroke="#16a34a" stroke-width="0"/><text x="70" y="92" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">/ 10</text><text x="70" y="108" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#ffffff" text-anchor="middle">pts</text><text x="112" y="88" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#16a34a" text-anchor="start">1. Definicion de requerimientos</text><text x="112" y="105" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="start">Identifica correctamente dispositivos, redes y necesidades. Justifica cada eleccion segun el escenario.</text><rect x="40" y="132" width="720" height="52" rx="8" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><rect x="40" y="132" width="60" height="52" rx="8" fill="#0b66c3" stroke="#0b66c3" stroke-width="0"/><text x="70" y="154" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">/ 10</text><text x="70" y="170" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#ffffff" text-anchor="middle">pts</text><text x="112" y="150" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0b66c3" text-anchor="start">2. Esbozo y diseno de la red</text><text x="112" y="167" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="start">Topologia clara y organizada en PT. Se puede identificar la arquitectura a simple vista.</text><rect x="40" y="194" width="720" height="52" rx="8" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><rect x="40" y="194" width="60" height="52" rx="8" fill="#0b66c3" stroke="#0b66c3" stroke-width="0"/><text x="70" y="216" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">/ 10</text><text x="70" y="232" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#ffffff" text-anchor="middle">pts</text><text x="112" y="212" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0b66c3" text-anchor="start">3. Implementacion en Packet Tracer</text><text x="112" y="229" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="start">Todos los dispositivos conectados, router configurado, IPs asignadas y redes funcionando.</text><rect x="40" y="256" width="720" height="52" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><rect x="40" y="256" width="60" height="52" rx="8" fill="#d97706" stroke="#d97706" stroke-width="0"/><text x="70" y="278" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">/ 10</text><text x="70" y="294" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#ffffff" text-anchor="middle">pts</text><text x="112" y="274" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#d97706" text-anchor="start">4. Configuracion de dispositivos</text><text x="112" y="291" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="start">Laptops y moviles conectados al Wi-Fi. IPs correctas. Pings exitosos entre todas las redes.</text><rect x="40" y="318" width="720" height="52" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/><rect x="40" y="318" width="60" height="52" rx="8" fill="#dc2626" stroke="#dc2626" stroke-width="0"/><text x="70" y="340" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">/ 10</text><text x="70" y="356" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#ffffff" text-anchor="middle">pts</text><text x="112" y="336" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="start">5. Resolucion de problemas</text><text x="112" y="353" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="start">Los pings requeridos son exitosos. Si hubo errores, documenta que fue y como lo resolvio.</text><rect x="40" y="380" width="720" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/><rect x="40" y="380" width="60" height="52" rx="8" fill="#7c3aed" stroke="#7c3aed" stroke-width="0"/><text x="70" y="402" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">/ 10</text><text x="70" y="418" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#ffffff" text-anchor="middle">pts</text><text x="112" y="398" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#7c3aed" text-anchor="start">6. Documentacion tecnica</text><text x="112" y="415" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="start">Entrega completa: .pkt + tabla IPs + capturas de pings + justificacion escrita.</text><rect x="40" y="448" width="720" height="30" rx="6" fill="#dc2626" stroke="#dc2626" stroke-width="1.5"/><text x="400" y="468" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">TOTAL: 60 puntos = 55% de la nota final del curso</text></svg>