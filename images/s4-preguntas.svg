<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#eaf1f8"/><stop offset="100%" stop-color="#cfdceb"/></linearGradient></defs><rect width="800" height="450" fill="url(#bg)" rx="16"/><text x="400" y="30" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">Preguntas tipicas de la defensa</text><text x="400" y="52" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">El docente elige 2-3 por grupo segun lo que vea en la topologia</text><rect x="45" y="80" width="345" height="52" rx="8" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.2"/><rect x="285" y="88" width="95" height="16" rx="8" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.2" stroke-opacity="0.5"/><text x="332" y="101" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0b66c3" text-anchor="middle">Redes y diseño</text><text x="55" y="102" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">"¿Por que eligieron esa topologia y no otra?"</text><rect x="415" y="80" width="345" height="52" rx="8" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.2"/><rect x="655" y="88" width="95" height="16" rx="8" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.2" stroke-opacity="0.5"/><text x="702" y="101" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0b66c3" text-anchor="middle">Resiliencia</text><text x="425" y="102" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">"¿Que pasa si el router se cae? ¿Que sigue funcionando?"</text><rect x="45" y="142" width="345" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><rect x="285" y="150" width="95" height="16" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2" stroke-opacity="0.5"/><text x="332" y="163" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#16a34a" text-anchor="middle">ARP — Capa 2/3</text><text x="55" y="164" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">"¿Por que el primer ping da timeout y los siguientes responden?"</text><rect x="415" y="142" width="345" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><rect x="655" y="150" width="95" height="16" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2" stroke-opacity="0.5"/><text x="702" y="163" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#16a34a" text-anchor="middle">Enrutamiento</text><text x="425" y="164" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">"¿Cual es la diferencia entre el gateway del router y el de las PCs?"</text><rect x="45" y="204" width="345" height="52" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/><rect x="285" y="212" width="95" height="16" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.2" stroke-opacity="0.5"/><text x="332" y="225" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#d97706" text-anchor="middle">Subredes</text><text x="55" y="226" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">"¿Por que usaron /24 y no /16 o /30?"</text><rect x="415" y="204" width="345" height="52" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/><rect x="655" y="212" width="95" height="16" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.2" stroke-opacity="0.5"/><text x="702" y="225" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#d97706" text-anchor="middle">Seguridad</text><text x="425" y="226" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">"¿Como protegerian la red Wi-Fi de accesos no autorizados?"</text><rect x="45" y="266" width="345" height="52" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/><rect x="285" y="274" width="95" height="16" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2" stroke-opacity="0.5"/><text x="332" y="287" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="middle">Diagnostico</text><text x="55" y="288" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">"¿Que harian si una PC no puede hacer ping al servidor?"</text><rect x="415" y="266" width="345" height="52" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/><rect x="655" y="274" width="95" height="16" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2" stroke-opacity="0.5"/><text x="702" y="287" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="middle">Segmentacion</text><text x="425" y="288" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">"¿Que ventaja tiene poner los moviles en otra subred?"</text><rect x="40" y="335" width="720" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="400" y="358" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Consejo para la defensa</text><text x="400" y="380" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Respondan juntos. Si no saben algo, digan como lo investigarian. La honestidad suma mas que inventar.</text><text x="400" y="430" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0b66c3" text-anchor="middle">No memoricen respuestas — entiendan el por que de cada decision que tomaron</text></svg>