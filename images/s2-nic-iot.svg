<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eaf1f8"/>
      <stop offset="100%" style="stop-color:#cfdceb"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a4f96"/>
      <stop offset="100%" style="stop-color:#0b66c3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>
  
  <rect x="40" y="40" width="340" height="200" rx="12" fill="#dbeafe" stroke="#0b66c3" stroke-width="2"/>
  <text x="210" y="70" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">NIC — Network Interface Card</text>
  <line x1="40" y1="80" x2="380" y2="80" stroke="#0b66c3" stroke-width="0.8"/>
  <text x="60" y="105" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Identificación: MAC Address</text><text x="60" y="125" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="start">48 bits · Grabada en hardware</text>
  <text x="60" y="150" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Tipos: PCI · PCIe · USB · Integrada</text>
  <text x="60" y="170" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Velocidades: 100M · 1G · 10G</text>
  <text x="60" y="192" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Capa OSI: Capa 2 (Enlace)</text><text x="60" y="212" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="start">Controlador (driver) necesario</text>
  <rect x="420" y="40" width="340" height="200" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="590" y="70" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">IoT — Internet de las Cosas</text>
  <line x1="420" y1="80" x2="760" y2="80" stroke="#16a34a" stroke-width="0.8"/>
  <text x="440" y="105" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Dispositivos con IP en la red</text><text x="440" y="125" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="start">Sensores · Cámaras · Smart Home</text>
  <text x="440" y="150" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Protocolo: MQTT · CoAP · HTTP</text>
  <text x="440" y="170" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Seguridad: VLAN separada</text><text x="440" y="192" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="start">Firmware actualizado siempre</text>
  <text x="440" y="212" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Capa OSI: Capas 3-7</text>
  <rect x="40" y="270" width="720" height="90" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="400" y="298" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Configuración de una NIC — pasos clave</text>
  <text x="60" y="324" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">1. Verificar driver instalado</text><text x="280" y="324" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">2. Asignar IP (DHCP o estática)</text><text x="520" y="324" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">3. Verificar con ipconfig</text>
  <text x="60" y="344" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">4. Ping al gateway</text><text x="280" y="344" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">5. Ping a Internet (8.8.8.8)</text><text x="520" y="344" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">6. Ping por nombre (DNS)</text>
  <text x="400" y="430" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#50607a" text-anchor="middle">La NIC es el punto de entrada de cada dispositivo a la red</text>
  <text x="400" y="452" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#dc2626" text-anchor="middle">Un IoT mal configurado puede comprometer toda la red — usar VLAN separada</text>
</svg>