<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eaf1f8"/>
      <stop offset="100%" style="stop-color:#cfdceb"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a4f96"/>
      <stop offset="100%" style="stop-color:#0b66c3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>
  
  <!-- Shield -->
  <polygon points="400,40 520,90 520,230 400,290 280,230 280,90" fill="#dbeafe" stroke="#0b66c3" stroke-width="2.5"/>
  <text x="400" y="160" font-family="Arial,sans-serif" font-size="40" font-weight="normal" fill="#0b66c3" text-anchor="middle">🔐</text>
  <text x="400" y="210" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0b66c3" text-anchor="middle">Seguridad</text>
  <text x="400" y="228" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#50607a" text-anchor="middle">de Red</text>

  <!-- Cards around -->
  <rect x="50" y="80" width="170" height="90" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="135" y="112" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">Firewall</text>
  <text x="135" y="132" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Filtra tráfico</text>
  <text x="135" y="150" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">por reglas</text>

  <rect x="580" y="80" width="170" height="90" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="665" y="112" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#d97706" text-anchor="middle">IDS / IPS</text>
  <text x="665" y="132" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Detecta intrusiones</text>
  <text x="665" y="150" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">y bloquea</text>

  <rect x="50" y="310" width="170" height="90" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="135" y="342" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#16a34a" text-anchor="middle">VPN</text>
  <text x="135" y="362" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Túnel cifrado</text>
  <text x="135" y="380" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">redes remotas</text>

  <rect x="580" y="310" width="170" height="90" rx="10" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/>
  <text x="665" y="342" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0b66c3" text-anchor="middle">NAT</text>
  <text x="665" y="362" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="middle">IP privada → pública</text>
  <text x="665" y="380" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Oculta estructura</text>

  <!-- Connecting lines -->
  <line x1="220" y1="125" x2="280" y2="150" stroke="#dc262660" stroke-width="1.5"/>
  <line x1="580" y1="125" x2="520" y2="150" stroke="#d9770660" stroke-width="1.5"/>
  <line x1="220" y1="355" x2="280" y2="230" stroke="#16a34a60" stroke-width="1.5"/>
  <line x1="580" y1="355" x2="520" y2="230" stroke="#0b66c360" stroke-width="1.5"/>

  <text x="400" y="460" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#50607a" text-anchor="middle">Defensa en profundidad: múltiples capas de protección</text>
  <text x="400" y="482" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">Firewall + IDS/IPS + VPN + NAT + Políticas</text>
</svg>