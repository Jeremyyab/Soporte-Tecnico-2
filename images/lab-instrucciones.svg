f" font-size="10" font-weight="bold" fill="#16a34a" text-anchor="middle">5</text><text x="100" y="276" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">5. Configurar gateway en cada PC</text><circle cx="75" cy="316" r="12" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><text x="75" y="320" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0b66c3" text-anchor="middle">6</text><text x="100" y="320" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">6. Ping entre PCs de distintos switches</text><circle cx="75" cy="360" r="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="75" y="364" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#16a34a" text-anchor="middle">7</text><text x="100" y="364" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">7. Ping al servidor desde todas las PCs</text><circle cx="75" cy="404" r="12" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><text x="75" y="408" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0b66c3" text-anchor="middle">8</text><text x="100" y="408" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">8. Documentar: captura + tabla de IPs</text><text x="400" y="468" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">Red: 192.168.10.0/24  |  Verificar siempre con ping  ✓</text><text x="400" y="488" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Documentar decisiones con justificación técnica</text>
