<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eaf1f8"/>
      <stop offset="100%" style="stop-color:#cfdceb"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a4f96"/>
      <stop offset="100%" style="stop-color:#0b66c3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>
  
  <!-- DNS -->
  <rect x="50" y="60" width="320" height="140" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="210" y="95" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#16a34a" text-anchor="middle">DNS</text>
  <text x="210" y="118" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Domain Name System</text>
  <text x="70" y="148" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#0f172a" text-anchor="start">google.com  →  142.250.x.x</text>
  <text x="70" y="168" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="start">Puerto 53 UDP/TCP</text>
  <text x="70" y="186" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#16a34a" text-anchor="start">"Guía telefónica" de Internet</text>

  <!-- DHCP -->
  <rect x="430" y="60" width="320" height="140" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="590" y="95" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#d97706" text-anchor="middle">DHCP</text>
  <text x="590" y="118" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Dynamic Host Config</text>
  <text x="450" y="148" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#0f172a" text-anchor="start">Asigna IP automáticamente</text>
  <text x="450" y="168" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="start">IP · Máscara · Gateway · DNS</text>
  <text x="450" y="186" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#d97706" text-anchor="start">Sin DHCP → 169.254.x.x</text>

  <!-- IPv4 -->
  <rect x="50" y="240" width="700" height="120" rx="12" fill="#dbeafe" stroke="#0b66c3" stroke-width="2"/>
  <text x="400" y="268" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#0b66c3" text-anchor="middle">Direccionamiento IPv4</text>
  <text x="120" y="298" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">IP Privada</text>
  <text x="120" y="318" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">192.168.x.x / 10.x.x.x</text>
  <text x="120" y="336" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">172.16–31.x.x</text>
  <text x="400" y="298" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">IP Pública</text>
  <text x="400" y="318" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Asignada por el ISP</text>
  <text x="400" y="336" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Única en Internet</text>
  <text x="650" y="298" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">Gateway</text>
  <text x="650" y="318" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">IP del Router</text>
  <text x="650" y="336" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Puerta de salida</text>

  <!-- flow -->
  <text x="400" y="420" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">PC solicita IP → DHCP responde → DNS resuelve nombres → Navegación</text>
  <rect x="150" y="440" width="180" height="36" rx="20" fill="#fef3c7" stroke="#d97706" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="240" y="463" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">DISCOVER</text>
  <rect x="360" y="440" width="80" height="36" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="400" y="463" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">OFFER</text>
  <rect x="470" y="440" width="100" height="36" rx="20" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="520" y="463" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">REQUEST</text>
  <rect x="600" y="440" width="80" height="36" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="640" y="463" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">ACK ✓</text>
</svg>