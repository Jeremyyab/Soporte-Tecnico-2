a</text><text x="50" y="294" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">- Zebra - Honeywell</text><text x="50" y="313" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">- Uso industrial/campo</text><text x="50" y="334" font-family="Arial,sans-serif" font-size="9" font-weight="normal" fill="#50607a" text-anchor="start">Android o Windows</text><rect x="282" y="210" width="220" height="130" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/><text x="392" y="234" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#7c3aed" text-anchor="middle">E-Readers</text><text x="292" y="256" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">- Pantalla E-Ink</text><text x="292" y="275" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">- Bateria: semanas</text><text x="292" y="294" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">- Wi-Fi para descarga</text><text x="292" y="313" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">- Baja potencia</text><text x="292" y="334" font-family="Arial,sans-serif" font-size="9" font-weight="normal" fill="#50607a" text-anchor="start">Kindle - Kobo</text><rect x="524" y="210" width="220" height="130" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="634" y="234" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Lectores POS</text><text x="534" y="256" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">- Escaner codigo barras</text><text x="534" y="275" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#0f172a" text-anchor="start">- Terminal pago NFC</text><text x="