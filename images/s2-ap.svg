<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eaf1f8"/>
      <stop offset="100%" style="stop-color:#cfdceb"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a4f96"/>
      <stop offset="100%" style="stop-color:#0b66c3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>
  
  <circle cx="400" cy="180" r="110" fill="#dbeafe" stroke="#0b66c3" stroke-width="2"/>
  <text x="400" y="145" font-family="Arial,sans-serif" font-size="40" font-weight="normal" fill="#0b66c3" text-anchor="middle">📡</text>
  <text x="400" y="200" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0b66c3" text-anchor="middle">Wireless Router</text>
  <text x="400" y="220" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">WRT300N</text>
  <ellipse cx="400" cy="180" rx="180" ry="55" fill="none" stroke="#0b66c3" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="5 5"/>
  <ellipse cx="400" cy="180" rx="240" ry="75" fill="none" stroke="#0b66c3" stroke-width="0.6" stroke-opacity="0.2" stroke-dasharray="4 7"/>
  <rect x="40" y="320" width="300" height="140" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="190" y="346" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Configuración básica AP</text>
  <text x="60" y="370" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">SSID: TechSol-WiFi</text><text x="60" y="390" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Seguridad: WPA2-PSK</text><text x="60" y="410" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Contraseña: mínimo 8 chars</text><text x="60" y="430" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Canal: Auto (o fijo 1/6/11)</text>
  <rect x="460" y="320" width="300" height="140" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="610" y="346" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">DHCP del AP</text>
  <text x="480" y="370" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">IP AP: 192.168.30.1</text><text x="480" y="390" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Rango: .30.100 – .30.200</text><text x="480" y="410" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Máscara: /24</text><text x="480" y="430" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">DNS: 8.8.8.8</text>
  <text x="400" y="480" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Doble clic en WRT300N → Config → Wireless para configurar en PT</text>
</svg>