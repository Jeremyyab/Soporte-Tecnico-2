<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#eaf1f8"/><stop offset="100%" stop-color="#cfdceb"/></linearGradient></defs><rect width="800" height="500" fill="url(#bg)" rx="16"/><text x="400" y="32" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">Como configurar el WRT300N en Packet Tracer</text><rect x="40" y="55" width="340" height="175" rx="12" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><text x="210" y="80" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">Configuracion del AP</text><line x1="40" y1="90" x2="380" y2="90" stroke="#0b66c3" stroke-width="0.8"/><text x="58" y="112" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">1. Doble clic en WRT300N, pestana GUI</text><text x="58" y="131" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">2. Setup: IP del AP = 192.168.30.1</text><text x="58" y="150" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">3. Wireless: SSID = TechSol-WiFi</text><text x="58" y="169" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">4. Wireless: Canal = 6</text><text x="58" y="188" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">5. Wireless Security: WPA2 Personal</text><text x="58" y="207" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">6. Passphrase: Soporte2024</text><text x="58" y="222" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="start">7. Save Settings y aplicar</text><rect x="420" y="55" width="340" height="175" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="590" y="80" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Conectar Laptop-PT</text><line x1="420" y1="90" x2="760" y2="90" stroke="#16a34a" stroke-width="0.8"/><text x="438" y="112" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">1. Doble clic en Laptop, Config</text><text x="438" y="131" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">2. Wireless0: SSID TechSol-WiFi</text><text x="438" y="150" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">3. Authentication: WPA2-PSK</text><text x="438" y="169" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">4. PSK Pass Phrase: Soporte2024</text><text x="438" y="188" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">5. Verificar LED verde = conectado</text><text x="438" y="207" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">6. Desktop: IP Config, Static</text><text x="438" y="222" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="start">7. IP + Mascara + Gateway</text><rect x="40" y="255" width="720" height="100" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="400" y="282" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Smartphone-PT</text><text x="100" y="308" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Doble clic en Smartphone</text><text x="270" y="308" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Config, Wireless0</text><text x="440" y="308" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">SSID + WPA2 + Clave</text><text x="620" y="308" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">IP estatica</text><rect x="40" y="378" width="720" height="80" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="400" y="404" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Pings requeridos para el Caso 3</text><text x="100" y="430" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Laptop1 a PC0 cableada</text><text x="310" y="430" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Laptop1 a Server0</text><text x="510" y="430" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Phone a PC0</text><text x="670" y="430" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Phone a Laptop1</text></svg>