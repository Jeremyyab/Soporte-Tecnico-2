<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eaf1f8"/>
      <stop offset="100%" style="stop-color:#cfdceb"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a4f96"/>
      <stop offset="100%" style="stop-color:#0b66c3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>
  
  <!-- Packet Tracer window mock -->
  <rect x="80" y="50" width="640" height="320" rx="10" fill="#ffffff" stroke="#cfd9e6" stroke-width="1.5"/>
  <rect x="80" y="50" width="640" height="36" rx="10" fill="#0a4f96"/>
  <text x="400" y="73" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Cisco Packet Tracer — Simulador de Redes</text>
  <!-- Router icon -->
  <circle cx="200" cy="200" r="35" fill="#dbeafe" stroke="#0b66c3" stroke-width="2"/>
  <text x="200" y="204" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#0b66c3" text-anchor="middle">Router</text>
  <!-- Switch icons -->
  <rect x="330" y="170" width="60" height="40" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="360" y="194" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#d97706" text-anchor="middle">SW1</text>
  <rect x="330" y="250" width="60" height="40" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="360" y="274" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#d97706" text-anchor="middle">SW2</text>
  <!-- PC icons -->
  <circle cx="480" cy="155" r="22" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="480" y="159" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#16a34a" text-anchor="middle">PC1</text>
  <circle cx="540" cy="155" r="22" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="540" y="159" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#16a34a" text-anchor="middle">PC2</text>
  <circle cx="480" cy="285" r="22" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="480" y="289" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#16a34a" text-anchor="middle">PC3</text>
  <circle cx="540" cy="285" r="22" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="540" y="289" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#16a34a" text-anchor="middle">PC4</text>
  <!-- Server -->
  <rect x="600" y="210" width="60" height="50" rx="8" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><text x="630" y="240" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#0b66c3" text-anchor="middle">SRV</text>
  <!-- Lines -->
  <line x1="235" y1="200" x2="330" y2="190" stroke="#cfd9e6" stroke-width="1.5"/><line x1="235" y1="200" x2="330" y2="270" stroke="#cfd9e6" stroke-width="1.5"/>
  <line x1="390" y1="190" x2="458" y2="162" stroke="#cfd9e6" stroke-width="1.5"/><line x1="390" y1="190" x2="518" y2="162" stroke="#cfd9e6" stroke-width="1.5"/>
  <line x1="390" y1="270" x2="458" y2="289" stroke="#cfd9e6" stroke-width="1.5"/><line x1="390" y1="270" x2="518" y2="289" stroke="#cfd9e6" stroke-width="1.5"/>
  <line x1="390" y1="190" x2="600" y2="230" stroke="#cfd9e6" stroke-width="1.5"/>
  <!-- Bottom scenario -->
  <rect x="80" y="390" width="640" height="80" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="400" y="418" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Escenario: 3 departamentos · 6 PCs · 1 Servidor · 1 Impresora</text>
  <text x="400" y="445" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Red: 192.168.10.0/24 · Verificar con ping</text>
  <text x="400" y="465" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Grupos de 3–4 personas · Duración: ~80 minutos</text>
</svg>