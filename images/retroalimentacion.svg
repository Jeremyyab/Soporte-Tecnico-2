  <text x="160" y="108" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Topología correcta</text><text x="400" y="108" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Dispositivos adecuados</text><text x="620" y="108" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Ping funciona</text>
  <text x="160" y="130" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ IPs coherentes</text><text x="400" y="130" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Documentación clara</text><text x="620" y="130" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Justificación</text>

  <circle cx="200" cy="280" r="80" fill="#dbeafe" stroke="#0b66c3" stroke-width="2"/><text x="200" y="270" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">Grupo 1</text><text x="200" y="292" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">2 min</text>
  <circle cx="400" cy="280" r="80" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="400" y="270" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Grupo 2</text><text x="400" y="292" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">2 min</text>
  <circle cx="600" cy="280" r="80" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="600" y="270" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Grupo 3</text><text x="600" y="292" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">2 min</text>

  <rect x="60" y="390" width="680" height="60" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="400" y="412" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#dc2626" text-anchor="middle">Errores frecuentes a evitar</text>
  <text x="180" y="436" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">IP duplicada</text>
  <text x="380" y="436" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Gateway incorrecto</text>
  <text x="580" y="436" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Cable equivocado</text>

  <text x="400" y="478" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Cada grupo: topología elegida · problema encontrado · qué cambiarían</text>
