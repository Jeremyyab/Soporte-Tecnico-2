<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eaf1f8"/>
      <stop offset="100%" style="stop-color:#cfdceb"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a4f96"/>
      <stop offset="100%" style="stop-color:#0b66c3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>
  
  <!-- TCP panel -->
  <rect x="50" y="60" width="320" height="260" rx="14" fill="#dbeafe" stroke="#0b66c3" stroke-width="2"/>
  <text x="210" y="95" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#0b66c3" text-anchor="middle">TCP</text>
  <text x="210" y="118" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Transmission Control Protocol</text>
  <text x="70" y="148" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Orientado a conexión</text>
  <text x="70" y="170" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Garantiza entrega</text>
  <text x="70" y="192" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Control de flujo</text>
  <text x="70" y="214" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Reenvía paquetes perdidos</text>
  <text x="70" y="236" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#50607a" text-anchor="start">✗ Más lento</text>
  <text x="70" y="268" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0b66c3" text-anchor="start">HTTP · HTTPS · FTP · SSH</text>

  <!-- UDP panel -->
  <rect x="430" y="60" width="320" height="260" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="590" y="95" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#d97706" text-anchor="middle">UDP</text>
  <text x="590" y="118" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">User Datagram Protocol</text>
  <text x="450" y="148" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Sin conexión (rápido)</text>
  <text x="450" y="170" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Menor overhead</text>
  <text x="450" y="192" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#50607a" text-anchor="start">✗ No garantiza entrega</text>
  <text x="450" y="214" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#50607a" text-anchor="start">✗ Sin reenvío de paquetes</text>
  <text x="450" y="236" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#0f172a" text-anchor="start">✓ Prioriza velocidad</text>
  <text x="450" y="268" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#d97706" text-anchor="start">DNS · VoIP · Gaming · Streaming</text>

  <!-- 3-way handshake -->
  <rect x="120" y="360" width="560" height="100" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="400" y="385" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">3-Way Handshake TCP</text>
  <text x="160" y="415" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="start">SYN →</text>
  <text x="370" y="415" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="start">← SYN-ACK</text>
  <text x="570" y="415" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="start">ACK →</text>
  <text x="400" y="445" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#16a34a" text-anchor="middle">Conexión establecida ✓</text>
  <text x="400" y="490" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#50607a" text-anchor="middle">Elegir el protocolo correcto es clave en el diagnóstico de red</text>
</svg>