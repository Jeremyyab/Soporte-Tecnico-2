<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#eaf1f8"/><stop offset="100%" stop-color="#cfdceb"/></linearGradient></defs><rect width="800" height="500" fill="url(#bg)" rx="16"/><text x="400" y="30" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">Conectividad movil — repaso clave</text><rect x="40" y="52" width="340" height="175" rx="12" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><text x="210" y="76" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">Bluetooth</text><line x1="40" y1="86" x2="380" y2="86" stroke="#0b66c3" stroke-width="0.8"/><text x="55" y="108" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Version 5.x — rango hasta 100m</text><text x="55" y="126" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Par: pin o NFC (emparejamiento)</text><text x="55" y="144" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Perfiles: A2DP (audio) HFP (llamadas)</text><text x="55" y="162" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">PAN: red IP sobre Bluetooth</text><text x="55" y="180" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">BLE (Low Energy): wearables e IoT</text><text x="55" y="198" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="start">Interferencia con Wi-Fi 2.4 GHz</text><rect x="420" y="52" width="340" height="175" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="590" y="76" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Celular — 4G/5G</text><line x1="420" y1="86" x2="760" y2="86" stroke="#16a34a" stroke-width="0.8"/><text x="438" y="108" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">4G LTE: hasta 100 Mbps tipico</text><text x="438" y="126" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">5G: sub-6GHz (cobertura) + mmWave</text><text x="438" y="144" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">SIM / eSIM — identificacion del abonado</text><text x="438" y="162" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">APN: punto de acceso a la red movil</text><text x="438" y="180" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="start">Hotspot: compartir datos del movil</text><text x="438" y="198" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="start">Roaming: cargos fuera de la red local</text><rect x="40" y="250" width="720" height="90" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="400" y="275" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Diagnostico rapido — dispositivo sin conectividad</text><text x="90" y="302" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Modo avion ON?</text><text x="240" y="302" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">SIM detectada?</text><text x="390" y="302" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">APN correcto?</text><text x="540" y="302" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Senal suficiente?</text><text x="680" y="302" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Roaming ON?</text><rect x="40" y="363" width="720" height="100" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="400" y="388" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">NFC — Near Field Communication</text><text x="400" y="413" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="middle">Rango: 4 cm — pago movil, control acceso, emparejamiento Bluetooth</text><text x="400" y="433" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="middle">Desactivar NFC en ambientes de alta seguridad — riesgo de skimming</text></svg>