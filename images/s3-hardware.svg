<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#eaf1f8"/><stop offset="100%" stop-color="#cfdceb"/></linearGradient></defs><rect width="800" height="500" fill="url(#bg)" rx="16"/><text x="400" y="30" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">Instalacion de hardware - laptops</text><rect x="40" y="50" width="350" height="155" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="215" y="75" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">RAM - Actualizacion</text><text x="55" y="98" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">SO-DIMM: insertar a 45 grados, empujar hasta clic</text><text x="55" y="116" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Misma generacion DDR (no mezclar DDR4/DDR5)</text><text x="55" y="134" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Pulsera ESD obligatoria antes de tocar</text><text x="55" y="152" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">POST confirma nueva capacidad al arrancar</text><text x="55" y="170" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Soldered = no reemplazable (verificar primero)</text><rect x="410" y="50" width="350" height="155" rx="12" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/><text x="585" y="75" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">SSD - Reemplazo</text><text x="425" y="98" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">M.2 NVMe: llave M - 3500 MB/s</text><text x="425" y="116" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">M.2 SATA: llave B+M - 550 MB/s</text><text x="425" y="134" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Clonar disco antes de reemplazar</text><text x="425" y="152" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Tornillo de sujecion en ranura M.2</text><text x="425" y="170" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">BIOS detecta nuevo SSD automaticamente</text><rect x="40" y="225" width="350" height="155" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="215" y="250" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Bateria - Reemplazo</text><text x="55" y="273" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Desconectar conector de bateria PRIMERO</text><text x="55" y="291" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">mAh = capacidad, V = voltaje exacto</text><text x="55" y="309" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Ciclos vida: 300-500 tipico</text><text x="55" y="327" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#dc2626" text-anchor="start">Bateria hinchada = peligro inmediato</text><text x="55" y="345" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">No exponer a calor ni perforar nunca</text><rect x="410" y="225" width="350" height="155" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/><text x="585" y="250" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#dc2626" text-anchor="middle">Pantalla - Sustitucion</text><text x="425" y="273" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Resolucion y tamano exactos al original</text><text x="425" y="291" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Tipo de panel: IPS, TN, OLED</text><text x="425" y="309" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Conector LCD/eDP: fragil, insertar recto</text><text x="425" y="327" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Abrir con espatula plastica, nunca metalica</text><text x="425" y="345" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#0f172a" text-anchor="start">Pixel test completo al terminar</text><rect x="40" y="400" width="720" height="62" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="400" y="426" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">Regla de oro</text><text x="400" y="450" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0f172a" text-anchor="middle">Desconectar bateria SIEMPRE antes de tocar cualquier componente interno</text></svg>