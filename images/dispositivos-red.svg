<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eaf1f8"/>
      <stop offset="100%" style="stop-color:#cfdceb"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a4f96"/>
      <stop offset="100%" style="stop-color:#0b66c3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>
  
  <!-- Hub -->
  <rect x="50" y="60" width="190" height="110" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="145" y="90" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#dc2626" text-anchor="middle">Hub</text>
  <text x="145" y="112" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Capa 1 — Física</text>
  <text x="145" y="132" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#dc2626" text-anchor="middle">Envía a TODOS</text>
  <text x="145" y="150" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="middle">(broadcast siempre)</text>

  <!-- Switch -->
  <rect x="305" y="60" width="190" height="110" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="90" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#d97706" text-anchor="middle">Switch</text>
  <text x="400" y="112" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Capa 2 — Enlace</text>
  <text x="400" y="132" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#d97706" text-anchor="middle">Aprende MAC</text>
  <text x="400" y="150" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="middle">Envía solo al destino</text>

  <!-- Router -->
  <rect x="560" y="60" width="190" height="110" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="655" y="90" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#16a34a" text-anchor="middle">Router</text>
  <text x="655" y="112" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Capa 3 — Red</text>
  <text x="655" y="132" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#16a34a" text-anchor="middle">Enruta paquetes IP</text>
  <text x="655" y="150" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="middle">Conecta redes</text>

  <!-- Access Point -->
  <rect x="50" y="220" width="190" height="110" rx="12" fill="#dbeafe" stroke="#0b66c3" stroke-width="2"/>
  <text x="145" y="250" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0b66c3" text-anchor="middle">Access Point</text>
  <text x="145" y="270" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Capa 2 — WiFi</text>
  <text x="145" y="290" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#0b66c3" text-anchor="middle">Ethernet → Wi-Fi</text>
  <text x="145" y="308" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="middle">No enruta</text>

  <!-- Firewall -->
  <rect x="305" y="220" width="190" height="110" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="250" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">Firewall</text>
  <text x="400" y="270" font-family="Arial,sans-serif" font-size="11" font-weight="normal" fill="#50607a" text-anchor="middle">Capas 3-7</text>
  <text x="400" y="290" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#dc2626" text-anchor="middle">Filtra tráfico</text>
  <text x="400" y="308" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="middle">Primera defensa</text>

  <!-- Diagram network -->
  <circle cx="655" cy="280" r="50" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="655" y="275" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#16a34a" text-anchor="middle">NAT</text>
  <text x="655" y="295" font-family="Arial,sans-serif" font-size="10" font-weight="normal" fill="#50607a" text-anchor="middle">IP Priv→Pub</text>

  <!-- OSI layer reference -->
  <rect x="50" y="370" width="700" height="90" rx="12" fill="#dbeafe" stroke="#0b66c3" stroke-width="1"/>
  <text x="400" y="398" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0b66c3" text-anchor="middle">Capas del modelo OSI y dispositivos correspondientes</text>
  <text x="145" y="424" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="middle">Capa 1: Hub</text>
  <text x="400" y="424" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#d97706" text-anchor="middle">Capa 2: Switch / AP</text>
  <text x="620" y="424" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#16a34a" text-anchor="middle">Capa 3: Router</text>
  <text x="400" y="446" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="middle">Firewall: Capas 3–7  |  NAT: Capa 3</text>
</svg>