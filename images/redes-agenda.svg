<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eaf1f8"/>
      <stop offset="100%" style="stop-color:#cfdceb"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a4f96"/>
      <stop offset="100%" style="stop-color:#0b66c3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>
  
  <rect x="60" y="60" width="210" height="110" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="75" y="90" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#16a34a" text-anchor="start">Bloque A</text>
  <text x="75" y="112" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="start">Teoría — 80 min</text>
  <text x="75" y="132" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="start">Fundamentos de redes</text>
  <text x="75" y="152" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="start">y conectividad</text>

  <rect x="295" y="60" width="210" height="110" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="310" y="90" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#d97706" text-anchor="start">Bloque B</text>
  <text x="310" y="112" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="start">Caso Práctico 1</text>
  <text x="310" y="132" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="start">Packet Tracer — 80 min</text>

  <rect x="530" y="60" width="210" height="110" rx="12" fill="#dbeafe" stroke="#0b66c3" stroke-width="1.5"/>
  <text x="545" y="90" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0b66c3" text-anchor="start">Bloque C</text>
  <text x="545" y="112" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="start">Retroalimentación</text>
  <text x="545" y="132" font-family="Arial,sans-serif" font-size="12" font-weight="normal" fill="#50607a" text-anchor="start">+ Proyecto — 40 min</text>

  <!-- Arrow connectors -->
  <polygon points="270,115 290,105 290,125" fill="#d97706"/>
  <polygon points="505,115 525,105 525,125" fill="#0b66c3"/>

  <!-- Timeline bar -->
  <rect x="60" y="210" width="680" height="18" rx="4" fill="#dbeafe" stroke="#cfd9e6" stroke-width="1"/>
  <rect x="60" y="210" width="340" height="18" rx="4" fill="#16a34a" opacity="0.5"/>
  <rect x="400" y="210" width="170" height="18" rx="4" fill="#d97706" opacity="0.5"/>
  <rect x="570" y="210" width="170" height="18" rx="4" fill="#0b66c3" opacity="0.5"/>
  <text x="230" y="204" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#16a34a" text-anchor="middle">80 min</text>
  <text x="485" y="204" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#d97706" text-anchor="middle">80 min</text>
  <text x="655" y="204" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#0b66c3" text-anchor="middle">40 min</text>

  <!-- Clock icon area -->
  <circle cx="400" cy="340" r="70" fill="#dbeafe" stroke="#0b66c3" stroke-width="2"/>
  <text x="400" y="310" font-family="Arial,sans-serif" font-size="36" font-weight="normal" fill="#0b66c3" text-anchor="middle">⏱</text>
  <text x="400" y="370" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0b66c3" text-anchor="middle">~200 minutos</text>
  <text x="400" y="390" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#50607a" text-anchor="middle">de clase</text>
  <text x="400" y="460" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="#50607a" text-anchor="middle">Semana 1 — TI-312 Soporte Técnico II</text>
</svg>