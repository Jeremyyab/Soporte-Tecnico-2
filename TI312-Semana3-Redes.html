   lb:`<div class="bigcard"><div class="title">Los 6 pasos — siempre en este orden</div><ol class="stepList"><li><b>Documentar:</b> fotografiar estado inicial, tornillos y conectores antes de tocar.</li><li><b>Desconectar:</b> apagar → retirar batería → pulsera ESD → descargar estática.</li><li><b>Desensamblar:</b> tornillos en orden, guardarlos separados, espátula plástica.</li><li><b>Reemplazar:</b> instalar componente nuevo respetando orientación y conectores.</li><li><b>Ensamblar:</b> orden inverso exacto. Verificar que todos los conectores estén bien.</li><li><b>Verificar:</b> encender → POST → SO detecta → prueba funcional completa.</li></ol></div><div class="grid"><div class="card"><strong>Herramientas</strong><ul><li>Destornillador Philips 00/000</li><li>Espátula plástica</li><li>Pulsera ESD</li><li>Pinzas de punta fina</li><li>Organizador tornillos</li></ul></div><div class="card"><strong>Errores comunes</strong><ul><li>Sin ESD antes de tocar</li><li>Forzar conectores invertidos</li><li>Perder tornillos</li><li>No fotografiar antes de abrir</li><li>Destornillador incorrecto</li></ul></div></div>`,

const TOTAL=slides.length;
const $=id=>document.getElementById(id);
function load(i){
  const s=slides[i];
  $("counterTxt").textContent=`${p2(i+1)} / ${p2(TOTAL)}`;
  $("kicker").textContent=s.k||"";
  document.querySelector("h1").textContent=s.ti||"";
  document.querySelector(".desc").textContent=s.de||"";
  $("leftBlocks").innerHTML=s.lb||"";
  const rb=$("rightBottom");rb.innerHTML="";
  if(s.rb){const mk=(l,v)=>{const d=document.createElement("div");d.className="miniCard";d.innerHTML=`<div class="label">${l}</div><div class="value">${v}</div>`;return d};if(s.rb.ak)rb.appendChild(mk(s.rb.ak,s.rb.av||""));if(s.rb.bk)rb.appendChild(mk(s.rb.bk,s.rb.bv||""));}
  const img=$("slideImg"),ph=$("ph");
  if(s.img){img.style.display="none";ph.style.display="block";img.src=s.img;img.onload=()=>{img.style.display="block";ph.style.display="none"};img.onerror=()=>{img.style.display="none";ph.textContent="Imagen no encontrada"};}
  else{img.style.display="none";ph.style.display="block";}
  $("progressBar").style.width=(((i+1)/TOTAL)*100)+"%";
  document.querySelector(".left").scrollTop=0;clearPen();
}
let idx=0;
function next(){if(idx<TOTAL-1){idx++;load(idx)}}
function prev(){if(idx>0){idx--;load(idx)}}
$("nextBtn").addEventListener("click",next);$("prevBtn").addEventListener("click",prev);
window.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key===" "){e.preventDefault();next()}if(e.key==="ArrowLeft"){e.preventDefault();prev()}});
const canvas=$("penCanvas"),deck=document.querySelector(".deck");
let penOn=false,drawing=false,last={x:0,y:0};
function resize(){const r=deck.getBoundingClientRect(),dpr=window.devicePixelRatio||1;canvas.width=Math.floor(r.width*dpr);canvas.height=Math.floor(r.height*dpr);canvas.style.width=r.width+"px";canvas.style.height=r.height+"px";canvas.getContext("2d").setTransform(dpr,0,0,dpr,0,0)}
window.addEventListener("resize",resize);
function pos(ev){const r=deck.getBoundingClientRect(),src=ev.touches?ev.touches[0]:ev;return{x:src.clientX-r.left,y:src.clientY-r.top}}
function draw(a,b){const ctx=canvas.getContext("2d");ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle=$("penColor").value;ctx.lineWidth=Number($("penSize").value);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}
function clearPen(){canvas.getContext("2d").clearRect(0,0,canvas.width,canvas.height)}
deck.addEventListener("mousedown",e=>{if(!penOn)return;drawing=true;last=pos(e);e.preventDefault()});
deck.addEventListener("mousemove",e=>{if(!penOn||!drawing)return;const p=pos(e);draw(last,p);last=p;e.preventDefault()});
window.addEventListener("mouseup",()=>drawing=false);
deck.addEventListener("touchstart",e=>{if(!penOn)return;drawing=true;last=pos(e);e.preventDefault()},{passive:false});
deck.addEventListener("touchmove",e=>{if(!penOn||!drawing)return;const p=pos(e);draw(last,p);last=p;e.preventDefault()},{passive:false});
window.addEventListener("touchend",()=>drawing=false);
$("penToggle").addEventListener("click",()=>{penOn=!penOn;canvas.style.pointerEvents=penOn?"auto":"none";$("penToggle").classList.toggle("on",penOn);$("penToggle").textContent=penOn?"✏️ Activo":"✏️ Lápiz"});
$("penClear").addEventListener("click",clearPen);
resize();load(0);
})();
</script>
